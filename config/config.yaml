# ============================================================
# AlgoBot — Master Configuration File
# ============================================================
# Version:      2.0.0
# Created:      2026-02-27
# Updated:      2026-02-28  Phase 5 — MTF Architecture
#               Changes from v1:
#                 - Added htf_bias section (weekly/monthly bias engine)
#                 - VMR SHORT disabled (was PF=0.76, primary drag)
#                 - ADX trending threshold raised 25->28 (higher quality)
#                 - Added intraday section (Opening Range Breakout)
#                 - Added quantconnect section (data source config)
#                 - Added mtf section (multi-timeframe routing rules)
# Purpose:      Single source of truth for ALL strategy parameters.
#               NEVER hardcode values in source files.
#               Every parameter here has a documented reason.
#
# To modify: Edit this file. All modules load from here at startup.
# To test a variation: Change a value, run backtest, compare results.
# ============================================================

# ------------------------------------------------------------
# PROJECT META
# ------------------------------------------------------------
project:
  name:     "AlgoBot"
  version:  "3.0.0"
  log_level: "INFO"       # DEBUG | INFO | WARNING | ERROR

# ------------------------------------------------------------
# OPERATING MODE
# CRITICAL: Do NOT change to "live" without completing all
#           validation stages and the Go/No-Go checklist.
# ------------------------------------------------------------
mode: "backtest"           # "backtest" | "paper" | "live"

# ============================================================
# STRATEGY PARAMETERS
# Each parameter has a comment explaining:
#   - What it does
#   - Why this specific value was chosen
#   - The academic/research source where applicable
# ============================================================

strategy:

  # ----------------------------------------------------------
  # STRATEGY 1: Triple Moving Average (TMA)
  # Purpose: Capture sustained directional trends
  # Activation: Trending regime only (ADX > adx.threshold_trending)
  # Markets: All 6
  # ----------------------------------------------------------
  tma:
    ema_fast:   8     # Fast EMA period.
                      # Value 8 is a Fibonacci number. Widely used by
                      # institutional trend systems. Fast enough to detect
                      # new trends early, slow enough to avoid whipsaws.

    ema_medium: 21    # Medium EMA period.
                      # Value 21 is a Fibonacci number. Acts as the
                      # confirmation layer — must be between fast and slow
                      # for "perfect alignment" signal to fire.

    ema_slow:   89    # Slow EMA period.
                      # Value 89 is a Fibonacci number. Defines the
                      # long-term trend direction. Price must be on the
                      # correct side of this EMA for entry.
                      # Source: Fibonacci EMA systems widely documented
                      # in Elliott Wave and institutional trend following.

  # ----------------------------------------------------------
  # STRATEGY 2: Donchian Channel System (DCS)
  # Purpose: Capture breakout moves at multi-week price extremes
  # Activation: Trending regime only (ADX > adx.threshold_trending)
  # Markets: All 6
  # Historical basis: Richard Donchian (1960s), Turtle Trading (1983)
  # ----------------------------------------------------------
  donchian:
    entry_period: 40  # Bars for breakout detection channel.
                      # PHASE 6 CHANGE: Reduced from 55 to 40 bars.
                      # Reason: 55 was too strict, generating only 1-2 signals
                      # per market per year. 40 bars (2 months) is still a
                      # significant breakout but fires ~35% more often.
                      # Combined with pullback entries, this raises trade
                      # frequency from 1.9/month to ~3-4/month.

    exit_period:  20  # Bars for exit channel.
                      # Value 20 also from Turtle System 2.
                      # Exit when price reaches the 20-bar opposite extreme.
                      # This gives trades room to develop while ensuring
                      # profits are protected when momentum fades.

  # ----------------------------------------------------------
  # STRATEGY 3: Volatility-Adjusted Mean Reversion (VMR)
  # Purpose: Capture short-term oversold bounces in ranging markets
  # Activation: Ranging regime only (ADX < adx.threshold_ranging)
  # Markets: ES and NQ ONLY (equity indices with best MR properties)
  # Source: Connors & Alvarez (2009), "Short-Term Trading Strategies"
  #
  # PHASE 5 CHANGE: VMR SHORT DISABLED.
  #   Reason: Backtest showed VMR SHORT PF=0.76 (net losing).
  #   In a sustained bull market, RSI>75 "overbought" is normal
  #   — prices keep rising after entry, causing losses.
  #   VMR LONG (oversold bounces) retains positive expectancy.
  #   Additional gate: weekly HTF bias must be BULL or NEUTRAL
  #   for VMR LONG to fire. Never buy a falling weekly trend.
  # ----------------------------------------------------------
  vmr:
    vmr_long_enabled:   true  # LONG (oversold bounces) — keep. Positive edge OOS PF=1.31.
    vmr_short_enabled:  false # SHORT (overbought fades) — DISABLED. PF=0.76.
                              # Re-enable only if weekly SHORT bias is added
                              # and overbought threshold raised to 85+.

    rsi_period:         5   # Fast RSI period.
                            # RSI(5) reacts in 1-3 bars to oversold conditions.
                            # RSI(14) is too slow — the bounce is often over
                            # by the time RSI(14) reaches extreme levels.

    oversold_threshold: 25  # RSI below this = long entry signal.
                            # Stricter than the traditional 30 to ensure
                            # we only trade EXTREME oversold readings,
                            # not every minor dip. Improves win rate.

    overbought_threshold: 75 # RSI above this = short entry (DISABLED — see above).
                             # Stricter than the traditional 70.

    sma_filter_period:  50  # SMA period for trend filter.
                            # Price must be within sma_filter_tolerance
                            # of this SMA. Prevents trading mean reversion
                            # in strongly trending markets.

    sma_filter_tolerance: 0.03  # Maximum distance from SMA as fraction.
                                # 0.03 = price within 3% of SMA(50).
                                # If price is 5% below SMA, it may be
                                # trending down — do not fade that move.

    max_hold_bars:      5   # Maximum bars to hold a mean reversion trade.
                            # Mean reversion is a short-term strategy.
                            # Exit at bar 5 even if RSI hasn't recovered.

    rsi_exit_long:      55  # Exit long when RSI rises above this level.
    rsi_exit_short:     45  # Exit short when RSI falls below this level.

  # ----------------------------------------------------------
  # STRATEGY 4: EMA Pullback Entry (Phase 6)
  # Purpose: Enter trend trades at better prices after EMA retest
  # Activation: Trending regime, after DCS confirms trend direction
  # Markets: All active markets
  # Win rate target: 60-70% (vs 45-55% for breakout entries)
  # ----------------------------------------------------------
  pullback:
    enabled: true            # Enable pullback entries alongside AGREE entries

    trend_context_bars: 20   # How far back to check if DCS fired.
                             # 20 bars = 1 month. A trend established within
                             # the last 20 bars is still an active trend.

    pb_lookback: 3           # How many bars back to look for the EMA dip.
                             # 3 bars = 3 days (daily bars). If price touched
                             # the 8 EMA within 3 days and recovered, enter.
                             # Too wide (>5) = stale pullbacks, lower quality.

  # ----------------------------------------------------------
  # SIGNAL AGREEMENT FILTER
  # The most important feature for achieving our profit factor target.
  # When enabled: Both TMA and DCS must agree (same direction)
  # before a trend trade is entered.
  # Effect: Reduces trade count ~50%, but improves win rate from
  #         ~40% to ~47% and average R from ~2.8 to ~4.0.
  # Result: Profit Factor improvement from ~1.9 to ~2.8
  # ----------------------------------------------------------
  signal_agreement_filter:
    enabled: true     # ALWAYS true in production. Only disable to
                      # test individual strategy performance in research.

  # ----------------------------------------------------------
  # STRATEGY 5: VWAP Trend Pullback (Mode A)
  # Purpose: Enter in trend direction when price retests VWAP
  # Markets: NQ, MNQ, ES, MES (equity index futures — high VWAP respect)
  # Timeframe: 1H bars
  # Win rate target: 55-65% (pullback entries near institutional benchmark)
  # Signal: ≥3 bars above/below VWAP → price touches within 0.15% of VWAP
  #         → bounce bar closes in trend direction → enter on next bar
  # ----------------------------------------------------------
  vwap_pullback:
    enabled: true              # Enable VWAP pullback entries

    touch_threshold_pct: 0.15  # How close to VWAP counts as a "touch" (%).
                               # 0.15% of price. At NQ 20,000 → 30pt window.
                               # Tighter = fewer but cleaner entries.

    trend_bars_required: 3     # Minimum consecutive bars above/below VWAP
                               # before a pullback entry is valid.
                               # 3 bars = confirms trend is established,
                               # not a random oscillation.

    stop_atr_mult: 0.30        # Stop = bar_low − ATR × 0.30 (long).
                               # Tight stop because entry is at precise VWAP.
                               # Wider stops reduce R:R, not appropriate here.

    target_r: 2.0              # Target = entry + 2.0 × risk.
                               # 2R gives positive expectancy at 40%+ win rate.

    partial_exit_r: 1.0        # Take 50% off at 1R to lock profits.
                               # Remainder runs to 2R. Improves WR statistics.

    max_hold_bars: 8           # Max bars to hold before forced exit.
                               # VWAP trades typically resolve within 1 session.

    signal_window_start: "1000"  # ET — allow signals only after 10:00
    signal_window_end:   "1400"  # ET — no new entries after 14:00 (avoid close)

  # ----------------------------------------------------------
  # STRATEGY 6: VWAP Mean Reversion (Mode B)
  # Purpose: Fade extreme deviations from VWAP using SD bands
  # Markets: NQ, MNQ, ES, MES, GC, MGC, CL, MCL
  # Timeframe: 1H bars
  # Win rate target: 55-65% (price reverts to VWAP from extremes)
  # Signal: Price beyond ±2SD + RSI5 extreme (<25 or >75) + ADX<25
  # Entry: At close of ±2SD bar. Stop = ±3SD. Target = VWAP midline.
  # ----------------------------------------------------------
  vwap_reversion:
    enabled: true              # Enable VWAP mean-reversion entries

    sd_entry_threshold: 2.0    # Enter when price crosses this many SDs from VWAP.
                               # ±2SD contains 95.4% of price action under normal
                               # distribution. Beyond = statistically extreme.
                               # Academic: Bollinger (1992), VWAP deviation studies.

    sd_stop_threshold: 3.0     # Stop placed at ±3SD from VWAP.
                               # ±3SD = 99.7% of normal distribution.
                               # If price goes to 3SD, reversion thesis is broken.

    rsi_long: 20               # RSI(5) below this → long entry (equity indices).
                               # TIGHTENED 25→20 after 2026-04-04 backtest.
                               # At RSI=25 we were catching marginal oversold readings;
                               # at RSI=20 we only catch genuine extremes.
                               # Effect: ~30% fewer signals, higher win rate.

    rsi_short: 80              # RSI(5) above this → short entry (equity indices).
                               # TIGHTENED 75→80 after 2026-04-04 backtest.

    rsi_long_gold: 25          # RSI(5) threshold for GC/MGC long entry.
                               # Gold is genuinely bidirectional — RSI 25/75 gives
                               # more signals and better PF vs equities at 20/80.
                               # Backtest: GC PF=2.37 at 25/75 vs 1.44 at 20/80.

    rsi_short_gold: 75         # RSI(5) threshold for GC/MGC short entry.

    max_adx: 20                # Equity ADX cap (NQ/MNQ/ES/MES).
                               # TIGHTENED 25→20 after 2026-04-04 backtest.
                               # ADX 20-25 = transitioning; too many false MR signals.
                               # Below 20 = genuinely non-trending, MR works.

    max_adx_gold: 25           # GC/MGC ADX cap — original value kept.
                               # Gold's MR edge persists up to ADX=25.
                               # At ADX<20: N drops 89→40 signals, PF falls 2.37→1.34.

    equity_mr_long_only: true  # NQ/MNQ/ES/MES: only allow MR_Long (fade oversold dips).
                               # ADDED 2026-04-04: MR_Short on equity indices in bull
                               # market = PF=0.60, WR<15%. Equities trend up relentlessly.
                               # MR_Short re-enable only when weekly HTF = BEAR.
                               # GC/MGC unaffected — they are bidirectional.

    max_hold_bars: 6           # Max bars to hold if target not reached.
                               # MR trades should resolve fast; cut losers quick.

    signal_window_start: "1000"  # ET — consistent with Mode A
    signal_window_end:   "1430"  # ET — 30 min more time for GC/CL afternoon

# ============================================================
# REGIME CLASSIFIER PARAMETERS
# Controls which strategies are active in which market conditions
# ============================================================

regime:
  adx_period: 14              # ADX lookback period.
                              # Value 14 is the standard Wilder default.
                              # Widely used and well-validated.

  threshold_trending:   25    # ADX above this = TRENDING regime.
                              # PHASE 6 CHANGE: Lowered from 28 back to 25.
                              # Reason: 28 created excessive dead zones
                              # (TRANSITIONING), cutting trade frequency ~30%.
                              # At 25: still a real trend, but more signal
                              # opportunities per year. Academic standard is 25.
                              # Impact: +30% trade frequency, same quality.

  threshold_ranging:    20    # ADX below this = RANGING regime.
                              # VMR strategy active (ES/NQ only).
                              # Gap between 20 and 28 = TRANSITIONING
                              # (no new entries in either strategy).

  # Volatility regime: compares current ATR to its own historical average
  high_vol_atr_multiplier:    1.5  # ATR > 1.5× 90-day avg = HIGH VOLATILITY
                                   # Effect: Position sizes halved (0.5% risk)

  crisis_atr_multiplier:      2.5  # ATR > 2.5× 90-day avg = CRISIS
                                   # Effect: No new positions opened at all

  vol_lookback_days:          90   # Days to average ATR over for comparison

# ============================================================
# POSITION SIZING PARAMETERS
# The ATR-based risk framework. This is what keeps the account alive.
# ============================================================

position_sizing:
  risk_per_trade_pct:   1.0   # Percentage of account equity to risk per trade.
                              # At $150k: 1.0% = $1,500 per trade maximum loss.
                              # Conservative. Increase to 1.5% ONLY after
                              # 3+ months of verified live profitability.

  atr_period:           20    # ATR lookback for position sizing.
                              # Value 20 is more stable than the common 14.
                              # Less sensitive to single-day vol spikes.

  stop_multiplier_trend:  2.5 # Stop distance for trend trades = ATR × 2.5.
                              # Wide enough to survive normal price noise,
                              # tight enough to limit loss.

  stop_multiplier_mr:     1.5 # Stop distance for mean reversion = ATR × 1.5.
                              # Tighter because mean reversion should work
                              # quickly — if it doesn't, exit fast.

  trailing_activation_r:  1.0 # Start trailing stop when trade is +1.0R profit.
                              # (R = the initial risk in dollars)

  trailing_stop_atr:      2.0 # Trailing stop distance = ATR × 2.0.
                              # Trails this many ATRs below the highest close.

  # ── Phase 6: Fixed profit target + breakeven management ──────────────────
  profit_target_r:        0.0 # DISABLED: trailing stop only.
                              # Hard target at 2.5R was cutting off trailing
                              # stop exits that were the biggest winners.
                              # Let trailing stop determine all exits.
                              # Set to non-zero to re-enable.

  breakeven_move_r:       1.5 # Move hard stop to entry price at +1.5R.
                              # Protects profits on trades that reach +1.5R
                              # but don't make it to the 2.5R target.
                              # Converts "breakeven exits" into actual wins.
                              # WR boost: ~4-6% additional.

# ============================================================
# RISK MODES — Safe / Medium / Hardcore
# Selected from the web control panel or by setting active_mode below.
# Each mode is a complete risk profile. The bot reads this at startup.
# All modes are profitable; they differ in position size and capital exposure.
# ============================================================

risk_mode:
  active: "safe"          # "safe" | "medium" | "hardcore"  (set from web UI)
                          # DEFAULT: "safe" — required for TopStep $50k account

  safe:
    label:               "Safe — TopStep $50k"
    description:         "1 micro contract max. TopStep $50k compliant. $1k daily limit / $2k trailing DD."
    risk_per_trade_pct:  0.50    # 0.5% equity per trade ($250 at $50k)
    max_contracts:       1       # Never more than 1 contract regardless of equity
    daily_loss_cap_usd:  900.0   # Hard stop: $100 buffer below TopStep $1,000 daily limit
    trailing_dd_cap_usd: 1800.0  # Pause bot: $200 buffer below TopStep $2,000 trailing DD
    max_loss_per_trade_usd: 400.0  # Per-trade hard cap: max 40% of daily budget per trade

  medium:
    label:               "Medium"
    description:         "Standard config. 2-3 contracts. FHB PF 2.87, Win 63.5% (v3 comprehensive)."
    risk_per_trade_pct:  1.00    # 1.0% equity per trade ($1,500 at $150k)
    max_contracts:       3       # Up to 3 contracts based on ATR sizing
    daily_loss_cap_usd:  2500.0  # Current Topstep-safe hard stop
    trailing_dd_cap_usd: 3000.0  # Current pause threshold
    max_loss_per_trade_usd: 2000.0  # Current Priority 1 cap

  hardcore:
    label:               "Hardcore"
    description:         "Aggressive sizing. 5 contracts. $3,800 daily cap gives $700 Topstep buffer."
    risk_per_trade_pct:  2.00    # 2.0% equity per trade ($3,000 at $150k)
    max_contracts:       5       # Up to 5 contracts (Topstep max for most programs)
    daily_loss_cap_usd:  3800.0  # Hard stop: $700 below Topstep $4,500 daily limit
    trailing_dd_cap_usd: 4000.0  # Pause: $500 below Topstep $4,500 trailing limit
    max_loss_per_trade_usd: 3000.0  # Wider per-trade room for 2R targets

# ============================================================
# RISK MANAGEMENT — HARD LIMITS
# These are enforced by code and cannot be overridden at runtime.
# They exist to protect the Topstep funded account.
# ============================================================

risk:
  # Per-trade limits
  max_contracts_per_market: 5   # Absolute maximum contracts in any single market.
                                # Prevents runaway position sizing bugs.

  # Portfolio-level limits
  max_portfolio_risk_pct: 8.0   # Maximum total open risk as % of equity.
                                # At $150k: max $12,000 open risk at any time.
                                # Prevents correlated drawdown across positions.

  max_open_positions: 6         # One position per market maximum.

  # Correlation limits
  max_equity_risk_pct: 2.0      # ES + NQ combined cannot exceed 2% equity risk.
                                # They are correlated (r=0.88), so we cap them.

  # Daily circuit breaker
  daily_loss_alert_usd:    750.0   # Telegram alert when daily loss hits this.
  daily_loss_hard_stop_usd: 900.0  # Bot closes ALL positions and stops trading.
                                   # TopStep $50k limit is $1,000/day.
                                   # We stop at $900 -- $100 safety buffer.

  # Trailing drawdown circuit breaker
  trailing_dd_alert_usd:   1500.0  # Telegram alert when trailing DD hits this.
  trailing_dd_pause_usd:   1800.0  # Bot pauses, requires manual restart.
                                   # TopStep $50k trailing DD limit is $2,000.
                                   # We pause at $1,800 -- $200 safety buffer.

  # Topstep official limits for $50k funded account (reference only)
  topstep_daily_limit_usd:      1000.0
  topstep_trailing_dd_usd:      2000.0

  # ── Priority 1: Per-trade hard loss cap ──────────────────────────────────────
  # If the ATR-based stop implies a larger loss than this, the stop is tightened.
  # Rationale: TopStep $50k daily limit is $1,000. Our circuit breaker fires at
  # $900. A single trade must never consume more than 40% of the daily budget.
  # Academic basis: Kelly Criterion + drawdown theory both require per-trade risk
  # to be bounded independently of volatility regime.
  max_loss_per_trade_usd: 400.0   # Hard cap: single trade loss ceiling ($)
  half_stop_r:            0.20    # Exit 50% of position at this adverse R level (P2)
                                  # Reduces avg full-stop loss from -1.0R to -0.60R

# ============================================================
# MARKETS CONFIGURATION
# Exact contract specifications for all 6 markets
# ============================================================

markets:
  ES:
    name:          "E-mini S&P 500"
    exchange:      "CME"
    point_value:   50.0          # $50 per full index point
    tick_size:     0.25          # Minimum price increment (0.25 points)
    tick_value:    12.50         # $12.50 per tick
    commission:    5.00          # $ per side (realistic for retail futures)
    slippage_ticks: 1            # Assumed 1 tick slippage per fill
    active:        true
    vmr_eligible:  true          # Can trade mean reversion strategy

  NQ:
    name:          "E-mini Nasdaq-100"
    exchange:      "CME"
    point_value:   20.0          # $20 per full index point
    tick_size:     0.25
    tick_value:    5.00
    commission:    5.00
    slippage_ticks: 1
    active:        true
    vmr_eligible:  true          # Can trade mean reversion strategy

  GC:
    name:          "Gold Futures"
    exchange:      "COMEX"
    point_value:   100.0         # $100 per troy ounce point
    tick_size:     0.10
    tick_value:    10.00
    commission:    5.00
    slippage_ticks: 1
    active:        true
    vmr_eligible:  true          # GC_REV is a mean-reversion fade strategy
                                 # Signal disabled in enabled_signals until edge confirmed

  CL:
    name:          "WTI Crude Oil"
    exchange:      "NYMEX"
    point_value:   1000.0        # $1,000 per dollar (e.g., $0.01 = $10)
    tick_size:     0.01
    tick_value:    10.00
    commission:    5.00
    slippage_ticks: 1
    active:        true
    vmr_eligible:  false

  ZB:
    name:          "30-Year Treasury Bond"
    exchange:      "CBOT"
    point_value:   1000.0        # $1,000 per full point
    tick_size:     0.03125       # 1/32 of a point
    tick_value:    31.25
    commission:    5.00
    slippage_ticks: 1
    active:        true
    vmr_eligible:  false

  6E:
    name:          "Euro FX Futures"
    exchange:      "CME"
    point_value:   125000.0      # €125,000 per contract
    tick_size:     0.00005       # 0.5 pip
    tick_value:    6.25
    commission:    5.00
    slippage_ticks: 1
    active:        false         # DISABLED Phase 6: OOS PF=0.25, 18% WR, 0 profitable years.
                                 # EUR/USD ranging 43% of 2020-2024 — no trend-follow edge.
                                 # Re-enable only with 5+ year IB data and dedicated
                                 # mean-reversion strategy tuned to EUR range dynamics.
    vmr_eligible:  false

  RTY:
    name:          "E-mini Russell 2000"
    exchange:      "CME"
    point_value:   50.0          # $50 per full index point
    tick_size:     0.10          # Minimum price increment
    tick_value:    5.00
