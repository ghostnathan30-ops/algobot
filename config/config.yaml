  YM:
    name:          "E-mini Dow Jones"
    exchange:      "CBOT"
    point_value:   5.0           # $5 per full index point
    tick_size:     1.0           # 1 Dow point = $5
    tick_value:    5.00
    commission:    5.00
    slippage_ticks: 1
    active:        true
    vmr_eligible:  false

# ============================================================
# BACKTESTING CONFIGURATION
# ============================================================

backtest:
  start_date:        "2000-01-01"   # 25 years of history
  end_date:          "2024-12-31"
  in_sample_end:     "2019-12-31"   # Training data cutoff (20 years)
  out_of_sample_start: "2020-01-01" # Reserved test data (5 years)

  initial_capital:   150000.0       # Starting account size ($)
  benchmark_symbol:  "SPY"          # Buy-and-hold comparison

  # Walk-forward windows (7 periods)
  walk_forward_windows:
    - train_end: "2004-12-31"
      test_start: "2005-01-01"
      test_end:   "2006-12-31"
    - train_end: "2006-12-31"
      test_start: "2007-01-01"
      test_end:   "2008-12-31"
    - train_end: "2008-12-31"
      test_start: "2009-01-01"
      test_end:   "2010-12-31"
    - train_end: "2010-12-31"
      test_start: "2011-01-01"
      test_end:   "2013-12-31"
    - train_end: "2013-12-31"
      test_start: "2014-01-01"
      test_end:   "2017-12-31"
    - train_end: "2017-12-31"
      test_start: "2018-01-01"
      test_end:   "2020-12-31"
    - train_end: "2020-12-31"
      test_start: "2021-01-01"
      test_end:   "2024-12-31"

  # Crisis period tests
  crisis_periods:
    - label: "2008 Financial Crisis"
      start: "2008-09-01"
      end:   "2009-03-31"
      max_allowed_drawdown_pct: 20.0

    - label: "2010-2012 Trend Drought"
      start: "2010-01-01"
      end:   "2012-12-31"
      max_allowed_loss_pct: 15.0

    - label: "2020 COVID Crash"
      start: "2020-02-19"
      end:   "2020-03-23"
      max_allowed_drawdown_pct: 12.0

    - label: "2022 Rate Hike Bear"
      start: "2022-01-01"
      end:   "2022-12-31"
      must_be_profitable: true

  # Monte Carlo settings
  monte_carlo:
    n_simulations: 10000
    max_dd_95th_percentile_limit: 35.0  # Must be below this (% of equity)

# ============================================================
# VALIDATION PASS CRITERIA
# These are the minimum thresholds for each stage
# ============================================================

validation:
  in_sample:
    min_profit_factor:   2.3
    min_sharpe_ratio:    1.0
    max_drawdown_pct:    22.0
    min_profitable_years: 16    # Of 20 in-sample years

  out_of_sample:
    min_profit_factor:   2.0
    min_sharpe_ratio:    0.8
    max_drawdown_pct:    28.0
    min_profitable_years: 3     # Of 5 out-of-sample years
    max_sharpe_degradation: 0.40  # OOS Sharpe can degrade up to 40% vs IS

  walk_forward:
    min_profitable_windows: 5   # Of 7 windows
    max_single_window_dd:   30.0

  stress:
    double_cost_min_pf:     1.5
    remove_best_trades_min_pf: 1.5
    param_sensitivity_min_sharpe: 0.7  # For ±20% parameter shifts

  paper_trading:
    min_days:              60
    max_signal_frequency_deviation: 0.25  # Within 25% of backtest
    max_pnl_deviation:     0.30            # Within 30% of backtest daily avg

# ============================================================
# LIVE TRADING CONFIGURATION (Phase 6+)
# ============================================================

live:
  broker:            "ninjatrader"   # "ninjatrader" | "ibkr"
  paper_mode:        true            # MUST be true until all validation passes
  data_feed:         "rithmic"       # "rithmic" | "ibkr"

  # How often the bot checks for new signals
  check_interval_seconds: 10

  # Market hours (CME futures)
  market_open_time:  "08:30"        # CT (Central Time)
  market_close_time: "15:00"        # CT — no new entries after this
  daily_reset_time:  "17:00"        # CT — P&L reset for next day

  # Session control
  trade_sunday_open:  false         # No trading Sunday evening open
  close_before_weekend: false       # Bot holds positions over weekend
                                    # (trend following benefits from weekend gaps)

# ============================================================
# MULTI-TIMEFRAME BIAS ENGINE (Phase 5)
# The top-down analysis layer. Determines "who controls the market"
# at the weekly and monthly level before any trade is entered.
# Only trades that align with HTF bias are allowed through.
# ============================================================

htf_bias:
  # ---- Weekly Bias ----------------------------------------
  # Computed from daily bars resampled to weekly (Friday close).
  # Determines the intermediate-term direction (1-4 weeks).
  weekly:
    ema_fast:    8    # Fast EMA on weekly bars.
                      # 8 weeks = ~2 months of context.
    ema_slow:    21   # Slow EMA on weekly bars.
                      # 21 weeks = ~5 months of context.
                      # Weekly EMA fast > slow = bullish weekly trend.
    adx_period:  14   # ADX on weekly bars.
    adx_min:     18   # Minimum weekly ADX to confirm bias direction.
                      # Below 18 on weekly = no strong weekly trend.
                      # Result: NEUTRAL bias (looser filter).

  # ---- Monthly Bias ---------------------------------------
  # Computed from daily bars resampled to monthly (last trading day).
  # Determines the macro direction (1-6 months).
  monthly:
    sma_period:  6    # 6-month SMA on monthly bars.
                      # Price above 6-month SMA = BULL macro bias.
                      # Price below 6-month SMA = BEAR macro bias.
                      # Within 1.5% of SMA = NEUTRAL.
    neutral_band: 0.015  # ±1.5% from monthly SMA = NEUTRAL zone.
                         # Prevents thrashing at the SMA boundary.

  # ---- Bias Gate Rules ------------------------------------
  # How the HTF bias filters strategy signals:
  #   TREND LONG allowed:  weekly=BULL, monthly=BULL or NEUTRAL
  #   TREND SHORT allowed: weekly=BEAR, monthly=BEAR or NEUTRAL
  #   VMR LONG allowed:    weekly=BULL or NEUTRAL (never in bear)
  #   VMR SHORT:           DISABLED entirely (see vmr section)
  #   ORB LONG allowed:    weekly=BULL or NEUTRAL
  #   ORB SHORT allowed:   weekly=BEAR or NEUTRAL
  require_monthly_agreement: false  # true = monthly must confirm weekly.
                                    # false = weekly alone sufficient.
                                    # Start false — monthly is lagging.

# ============================================================
# INTRADAY STRATEGY — OPENING RANGE BREAKOUT (Phase 5)
# Applied to 5-minute bars during Regular Trading Hours.
# Markets: ES and NQ only (most liquid, best intraday data).
# Direction: Filtered by HTF bias (weekly minimum).
# ============================================================

intraday:
  enabled: true           # Set false to run swing-only mode.

  markets: ["ES", "NQ"]  # Only these two markets trade intraday.
                          # GC, CL, ZB, 6E = swing/daily only.

  # ---- Opening Range Breakout (ORB) -----------------------
  orb:
    range_start_time:  "09:30"  # ET — NY market open
    range_end_time:    "09:45"  # ET — 15-min opening range window
                                # Range = high/low of first 3 5-min bars.
                                # Tighter range = smaller stop = 2R target
                                # achievable within 2-hour hold window.
                                # (was 30-min: too wide, 93% time exits)

    entry_buffer_ticks: 1       # Enter 1 tick ABOVE the range high (long)
                                # or 1 tick BELOW the range low (short).
                                # Avoids fakeouts right at the boundary.

    stop_at_range_opposite: true  # Stop loss = opposite side of range.
                                  # Long: stop at range low.
                                  # Short: stop at range high.
                                  # This defines the R for sizing.

    profit_target_r:    2.5     # Take profit at 2.5R. After 0.7R partial, stop
                                # trails to breakeven — second half is a free trade.
                                # Raised from 2.0: partial exits at 0.7R lock profit,
                                # making the higher ceiling zero incremental risk.
    partial_exit_r:     0.7     # Exit 50% of position at 0.7R (was 1.0R).
                                # Earlier partial + BE trail converts more stop_full
                                # outcomes into profitable stop_partial outcomes.
    partial_exit_pct:   0.50    # 50% of the position exited at 1R.

    max_hold_bars:      24      # Max 24 5-min bars = 2 hours.
                                # If trade not at target by noon ET,
                                # close it — midday chop kills edge.

    max_entries_per_day: 1      # One ORB entry per market per day.
                                # The opening range only prints once.
                                # Quality over quantity.

    no_entry_after_time: "11:30"  # No new ORB entries after 11:30 ET.
                                  # Too late — opening momentum is gone.

    gap_filter_enabled: true    # Skip ORB on gap-open days.
                                # When overnight gap > threshold, the range is already
                                # "broken" before the market opens — ORB edge disappears.
                                # Mirrors FHB gap_filter (same threshold).
    gap_threshold: 0.005        # 0.5% gap vs prior close triggers skip.

  # ---- First Hour Breakout (FHB) --------------------------
  fhb:
    markets: ["ES", "NQ", "GC"]    # Phase 6: Added GC. GC IS PF=1.77, OOS PF=1.77 — consistent edge.
                                   # GC 1h data available (730d). Gold first-hour breakout works
                                   # well during US session open (9:30-10:30 ET) due to
                                   # macro/dollar reaction at NYSE open. +0.25 trades/day.
    target_r: 2.5                  # Full target raised from 2.0R (second half is free trade)
    overnight_min_r: 0.4           # Lowered from 0.5 — more trades reach 2.5R
    range_expand_mult: 1.5         # Skip if 1h range > 1.5x 20-day avg (chaotic opens)
    range_lookback: 20             # Rolling window for avg range
    fast_bias_enabled: true        # Daily EMA10 vs EMA20 for early bear detection
    gap_filter_enabled: true       # Skip if open gaps >0.5% from prev close
    gap_threshold: 0.005           # 0.5% gap threshold
    rty_trend_only: true           # RTY: skip RANGING regime (PF 1.16 in RANGING)
    nq_bull_boost: true            # NQ: 1.5x size when HTF=BULL + fast=BULL + LONG
    nq_bull_mult: 1.5              # NQ conviction multiplier

  # ---- Risk limits for intraday ---------------------------
  intraday_risk_per_trade_pct: 0.5  # Half the swing risk per intraday trade.
                                    # Intraday = more trades = smaller size.
                                    # At $150k: 0.5% = $750/trade max loss.

  nq_intraday_risk_pct: 0.35        # NQ-specific override: 0.35% (vs 0.5% default).
                                    # NQ has 3-4x the dollar volatility of ES, causing
                                    # disproportionate DD (-$8,480 NQ vs -$2,549 ES on FHB).
                                    # Reduced from 0.5% to 0.35% to normalise risk.

# ============================================================
# QUANTCONNECT DATA SOURCE (Phase 5)
# Credentials stored in .env — never hardcode here.
# Reference: https://www.quantconnect.com/api/v2/
# ============================================================

quantconnect:
  # Credentials are loaded from environment variables:
  #   QC_USER_ID    — your numeric QuantConnect user ID
  #   QC_API_TOKEN  — generated at quantconnect.com > Account > API Access
  #
  # To set: add these two lines to AlgoBot/.env
  #   QC_USER_ID=12345
  #   QC_API_TOKEN=your_token_here

  api_base_url: "https://www.quantconnect.com/api/v2"

  # Intraday data resolutions available
  resolutions: ["minute", "hour", "daily"]  # minute = 1-min bars

  # Markets to download intraday data for
  intraday_markets:
    ES:
      qc_ticker: "ES"
      resolution: "minute"
      exchange:   "CME"
    NQ:
      qc_ticker: "NQ"
      resolution: "minute"
      exchange:   "CME"

  # Local cache directory for downloaded intraday data
  intraday_cache_dir: "data/raw/intraday"

  # How many years of intraday history to download
  intraday_history_years: 5   # QC free tier: ~5 years. Paid: more.

# ============================================================
# REPORTING CONFIGURATION
# ============================================================

# ============================================================
# GC MEAN REVERSION SUB-BOT (Phase A)
# Gold fades the FHB signal — inverted direction + VWAP target.
# Only enters when HTF does NOT strongly support the breakout.
# ============================================================

gc_reversion:
  target_r:           1.0     # Take profit at 1.0R (VWAP is ~0.5-1R away)
                               # Gold reverts fast — don't hold for 2R
  max_hold_bars:      3       # Max 3 hourly bars (3 hours) — exit if not reached
  atr_stop_mult:      1.0     # Stop = range_boundary + 1.0 * ATR14 above extreme
                               # Wider than FHB (1.0 vs 0.75) because we're fading
                               # — need room for the spike to exhaust itself
  skip_medium_impact: true    # GC is highly sensitive to economic data
                               # CPI/PPI/PCE all move gold aggressively
                               # Skip MEDIUM impact days (in addition to HIGH)
  skip_gap_days:      true    # Skip gap-open days (same filter as FHB)
  gap_threshold:      0.005   # 0.5% gap triggers skip (same as FHB)
  partial_exit_r:     0.3     # Exit 50% at 0.3R — lowered from 0.5R (2026-03-01 tune)
                               # Locks profit faster, raises win rate (49%->target 55%)
  partial_exit_pct:   0.50    # 50% partial

# ============================================================
# 6E LONDON OPEN MEAN REVERSION SUB-BOT (Phase B — Redesign v2)
# EUR/USD was RANGING 43% of 2023-2026. 60.6% of London breakouts
# FAIL and REVERT. Follow-mode failed (PF=0.575). Redesign: FADE.
# See LAB_013 for full analysis (v1 breakout → v2 fade redesign).
# ============================================================

london_open:
  fade_mode:          true     # FADE the breakout — mean reversion (redesign v2)
  range_start_time:   "03:00"  # ET — London open
  range_end_time:     "05:00"  # ET — 2-hour London range window
  entry_start_time:   "05:00"  # ET — start looking for fade signal after range complete
  no_entry_after:     "09:00"  # ET — close before US session (London fade edge ends at NY open)
  range_max_pips:     80       # Skip days with London range > 80 pips (extreme trend/gap days)
  range_stop_mult:    0.5      # Stop = signal_bar.extreme + 0.5×range_width → symmetric ~1:1 R/R
  atr_stop_mult:      0.0      # Disabled — using range_stop_mult instead
  target_r:           0.0      # 0.0 = use range midpoint as target (stored in lon_target)
  partial_exit_r:     0.4      # Exit 50% at 0.4R, trail to BE (earlier partial for fade)
  partial_exit_pct:   0.50     # 50% partial exit size
  max_hold_bars:      6        # Up to 6 bars (no_entry_after limits to ~4 hours from 5 AM)
  entry_buffer_ticks: 1        # 1 tick beyond range boundary for breakout detection
  skip_fomc:          true     # Skip FOMC days (in EconCalendar HIGH)
  skip_nfp:           true     # Skip NFP days (in EconCalendar HIGH)
  skip_ecb:           true     # Skip ECB meeting days (in EconCalendar HIGH)
  no_overnight_carry: true     # Must close before end of day — no overnight risk

reporting:
  output_dir:    "reports/"
  backtest_dir:  "reports/backtests/"
  validation_dir: "reports/validation/"
  live_dir:      "reports/live/"

  generate_html:  true
  generate_csv:   true
  include_charts: true

  # Metrics to include in every report
  metrics:
    - total_return_pct
    - annualized_return_pct
    - sharpe_ratio
    - sortino_ratio
    - calmar_ratio
    - profit_factor
    - max_drawdown_pct
    - max_drawdown_duration_days
    - win_rate_pct
    - avg_win_loss_ratio
    - total_trades
    - trades_per_month
    - expectancy_per_trade_usd
    - annual_returns_by_year
    - profit_factor_by_market

